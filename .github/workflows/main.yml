name: Deploy Web App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
      
      - name: Publish Web App
        uses: openMF/mifos-x-actionhub-web-publish-kmp@v1.0.1
        with:
          web_package_name: 'your-web-module-name'
          java-version: '21'
